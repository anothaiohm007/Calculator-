<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>เครื่องคิดเงินหน้าร้าน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --bg-soft: #0d0d0d;
    --bg-card: #161616;
    --bg-elevated: #1f1f1f;
    --text: #ffffff;
    --text-soft: #b8b8b8;
    --text-faint: #6a6a6a;
    --line: #262626;
    --line-soft: #1a1a1a;
    --accent: #ffffff;
    --green: #86efac;        /* mint อ่อน — ของเพิ่ม / จ่ายพอดี */
    --green-glow: rgba(134,239,172,0.4);
    --red: #fca5a5;          /* แดงอ่อน — error / ลบ */
    --amber: #fcd34d;        /* เหลืองอ่อน — โหมดจ่าย */
    --amber-glow: rgba(252,211,77,0.4);
    --blue: #93c5fd;         /* ฟ้าอ่อน — โหมด qty */
    --blue-glow: rgba(147,197,253,0.4);
    --pink: #f9a8d4;         /* ชมพูอ่อน — แก้ไข / quick action */
    --pink-glow: rgba(249,168,212,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Bai Jamjuree', 'JetBrains Mono', sans-serif;
    background: #000;
    color: var(--text);
    user-select: none;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: stretch;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0.2; }
  }
  /* Pulse glow — ใช้กับเหตุการณ์สำคัญ */
  @keyframes pulseGreen {
    0% { box-shadow: 0 0 0 0 var(--green-glow), inset 0 0 0 0 transparent; }
    50% { box-shadow: 0 0 0 8px transparent, inset 0 0 20px var(--green-glow); }
    100% { box-shadow: 0 0 0 0 transparent, inset 0 0 0 0 transparent; }
  }
  @keyframes pulseAmber {
    0% { box-shadow: 0 0 0 0 var(--amber-glow); }
    100% { box-shadow: 0 0 0 14px transparent; }
  }
  @keyframes itemAdded {
    0% { background: var(--bg-card); transform: translateX(-8px); opacity: 0; }
    40% { background: rgba(134,239,172,0.18); transform: translateX(0); opacity: 1; }
    100% { background: var(--bg-card); }
  }
  @keyframes totalChange {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); color: var(--green); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  @keyframes glowSweep {
    0%, 100% { background-position: -100% 50%; }
    100% { background-position: 200% 50%; }
  }

  .app {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    height: 100dvh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ===== HEADER ===== */
  header {
    padding: 14px 18px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--line);
  }
  .brand-name {
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    letter-spacing: 0.3px;
  }
  .brand-sub {
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .tabs {
    display: flex;
    gap: 2px;
    padding: 3px;
    background: var(--bg-card);
    border-radius: 8px;
  }
  .tab {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    cursor: pointer;
    color: var(--text-soft);
    border-radius: 6px;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--text);
    color: #000;
  }

  /* ===== RECEIPT ===== */
  .receipt {
    flex: 1;
    overflow-y: auto;
    padding: 12px 18px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    min-height: 60px;
  }
  .receipt-header {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 2px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--line);
  }
  .item {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
    margin-bottom: 4px;
    font-size: 14px;
    color: var(--text);
    background: var(--bg-card);
    border-radius: 8px;
    animation: itemAdded 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    transition: background 0.3s;
  }
  .item-label { display: flex; align-items: center; min-width: 0; }
  .item-num {
    color: var(--text-faint);
    font-size: 11px;
    width: 28px;
    font-weight: 600;
  }
  .item-price {
    font-weight: 700;
    color: var(--text);
    text-align: right;
    font-size: 15px;
  }
  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--bg-elevated);
    border-radius: 6px;
    padding: 2px;
  }
  .qty-btn {
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    color: var(--text);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .qty-btn:active {
    background: var(--text);
    color: #000;
  }
  .qty-val {
    min-width: 22px;
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
    padding: 0 2px;
  }
  .item-del {
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    font-weight: 400;
    width: 26px;
    height: 26px;
    font-family: inherit;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .item-del:active {
    background: var(--red);
    color: #fff;
  }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-faint);
    font-size: 13px;
    line-height: 1.7;
  }
  .empty-icon {
    font-size: 36px;
    margin-bottom: 10px;
    opacity: 0.4;
  }

  /* ===== TOTALS ===== */
  .totals {
    padding: 12px 18px 14px;
    background: var(--bg-soft);
    border-top: 1px solid var(--line);
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 14px;
    color: var(--text-soft);
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .total-grand {
    font-size: 30px;
    font-weight: 700;
    color: var(--text);
    margin-top: 6px;
    transition: transform 0.2s, color 0.3s;
  }
  .total-grand.bump {
    animation: totalChange 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .totals.success-flash {
    animation: pulseGreen 0.8s ease-out;
    background: linear-gradient(180deg, rgba(134,239,172,0.08), var(--bg-soft));
  }
  .totals.error-flash {
    animation: shake 0.4s ease-in-out;
  }
  .total-grand .label {
    font-size: 13px;
    color: var(--text-faint);
    letter-spacing: 2px;
    font-weight: 500;
  }
  .change {
    color: var(--green);
    font-weight: 700;
  }
  .change.negative {
    color: var(--red);
  }
  .pay-mode #changeAmount {
    font-size: 26px;
    color: var(--green);
    animation: pop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .pay-mode #paidRow, .pay-mode #changeRow {
    background: var(--bg-card);
    border-left: 2px solid var(--green);
    padding: 6px 12px;
    margin: 3px -6px;
    border-radius: 0 6px 6px 0;
  }
  .countdown-bar {
    height: 3px;
    background: var(--bg-elevated);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .countdown-fill {
    height: 100%;
    width: 100%;
    background: var(--green);
    transform-origin: left;
    animation: countdownShrink 5s linear forwards;
  }
  @keyframes countdownShrink {
    from { transform: scaleX(1); }
    to { transform: scaleX(0); }
  }
  .exact-btn {
    flex: 1;
    margin-top: 0;
    padding: 13px;
    background: linear-gradient(135deg, var(--green), #a7f3d0);
    color: #064e3b;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 4px 14px rgba(134,239,172,0.2);
    position: relative;
    overflow: hidden;
  }
  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .clear-btn {
    padding: 13px 16px;
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .clear-btn:active {
    background: var(--red);
    color: #000;
    transform: scale(0.97);
  }
  .clear-btn:disabled {
    color: var(--text-faint);
    border-color: var(--line);
    cursor: not-allowed;
  }
  .hold-btn {
    padding: 13px 14px;
    background: transparent;
    color: var(--amber);
    border: 1px solid var(--amber);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .hold-btn:active {
    background: var(--amber);
    color: #000;
    transform: scale(0.97);
  }
  .hold-btn:disabled {
    color: var(--text-faint);
    border-color: var(--line);
    cursor: not-allowed;
  }

  /* ===== PARKED BILLS BAR ===== */
  .parked-bar {
    display: none;
    gap: 6px;
    padding: 8px 14px;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .parked-bar::-webkit-scrollbar { display: none; }
  .parked-bar.active { display: flex; }
  .parked-label {
    font-size: 10px;
    color: var(--amber);
    letter-spacing: 1.5px;
    font-weight: 700;
    align-self: center;
    flex-shrink: 0;
    padding-right: 4px;
  }
  .parked-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px 7px 12px;
    background: var(--bg-card);
    border: 1px solid var(--amber);
    border-radius: 8px;
    font-family: inherit;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    animation: pop 0.25s ease-out;
  }
  .parked-chip:active {
    background: var(--amber);
    color: #000;
    transform: scale(0.97);
  }
  .parked-chip-name {
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .parked-chip-total {
    color: var(--text-soft);
    font-weight: 600;
  }
  .parked-chip:active .parked-chip-total { color: #000; }
  .parked-chip-x {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--bg-elevated);
    color: var(--text-faint);
    font-size: 11px;
    font-weight: 700;
    margin-left: 2px;
  }
  .parked-chip-x:active { background: var(--red); color: #fff; }
  .exact-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    background-size: 200% 100%;
    animation: glowSweep 3s linear infinite;
  }
  .exact-btn:active {
    transform: translateY(1px) scale(0.98);
    box-shadow: 0 2px 8px var(--green-glow);
  }
  .exact-btn:disabled {
    background: var(--bg-card);
    color: var(--text-faint);
    cursor: not-allowed;
    box-shadow: none;
  }
  .exact-btn:disabled::before { display: none; }

  /* ===== KEYPAD ===== */
  .keypad {
    padding: 10px 14px 14px;
    background: var(--bg);
    border-top: 1px solid var(--line);
  }
  .display-top {
    background: var(--bg-card);
    color: var(--text);
    margin: 6px 0 10px;
    padding: 16px 20px;
    border: 1px solid var(--line);
    border-radius: 12px;
    font-family: inherit;
    font-size: 42px;
    font-weight: 700;
    text-align: right;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    line-height: 1;
    letter-spacing: 1px;
    transition: border-color 0.2s;
    position: relative;
  }
  .display-top::after {
    content: '|';
    color: var(--text);
    animation: blink 1s ease-in-out infinite;
    margin-left: 2px;
    font-weight: 300;
  }
  .display-top .mode {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 2px;
    margin-right: auto;
    font-weight: 700;
    align-self: flex-start;
    margin-top: 4px;
    background: var(--bg-elevated);
    padding: 3px 8px;
    border-radius: 5px;
  }

  #displayValue {
    transition: color 0.1s, transform 0.1s;
  }
  #displayValue.flash {
    transform: scale(1.04);
  }

  .pay-mode .display-top {
    border-color: var(--amber);
  }
  .pay-mode .display-top .mode {
    color: var(--amber);
    background: rgba(251,191,36,0.12);
  }
  .pay-mode #displayValue {
    color: var(--amber);
  }
  .pay-mode .display-top::after { color: var(--amber); }

  .qty-mode .display-top {
    border-color: var(--blue);
  }
  .qty-mode .display-top .mode {
    color: var(--blue);
    background: rgba(96,165,250,0.12);
  }
  .qty-mode #displayValue {
    color: var(--blue);
  }
  .qty-mode .display-top::after { color: var(--blue); }

  .quick-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    margin-bottom: 6px;
  }
  .quick {
    background: var(--bg-card);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 4px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .quick:active {
    background: var(--text);
    color: #000;
    transform: scale(0.95);
  }
  .quick-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
  }
  .key {
    background: var(--bg-card);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 14px 0;
    border-radius: 10px;
    font-family: inherit;
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.12s;
  }
  .key:active {
    background: var(--text);
    color: #000;
    transform: scale(0.96);
  }
  .key.op {
    color: var(--text-soft);
    background: var(--bg-soft);
  }
  .key.op:active { background: var(--text); color: #000; }

  .key.add {
    background: var(--text);
    color: #000;
    font-size: 16px;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .key.add:active {
    background: var(--green);
    color: #000;
    transform: scale(0.96);
    box-shadow: 0 0 24px var(--green-glow);
  }

  .key.pay {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--text);
    font-size: 16px;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .key.pay:active {
    background: var(--amber);
    color: #000;
    border-color: var(--amber);
    box-shadow: 0 0 24px var(--amber-glow);
  }

  .key.danger {
    color: var(--red);
    background: var(--bg-soft);
  }
  .key.danger:active { background: var(--red); color: #fff; }

  /* ===== HISTORY ===== */
  .history-view {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    display: none;
  }
  .history-view.active { display: block; }
  .history-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
  }
  .bill-card {
    border: 1px solid var(--line);
    padding: 12px 14px;
    margin-bottom: 8px;
    background: var(--bg-card);
    border-radius: 10px;
    transition: all 0.2s;
    animation: fadeIn 0.25s ease-out;
  }
  .bill-card:active {
    transform: scale(0.98);
    background: var(--bg-elevated);
  }
  .bill-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .bill-total {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .bill-meta {
    font-size: 11px;
    color: var(--text-soft);
    margin-top: 4px;
    line-height: 1.5;
  }
  .history-clear {
    width: 100%;
    margin-top: 12px;
    padding: 11px;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .history-clear:active { background: var(--red); color: #fff; }
  .summary-bar {
    background: var(--bg-card);
    color: var(--text);
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
  }
  .summary-bar strong {
    font-size: 18px;
    color: var(--text);
  }
  .history-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30%;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #000;
    padding: 14px 26px;
    font-size: 14px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    font-family: inherit;
    letter-spacing: 0.3px;
    border-radius: 10px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== MODAL ===== */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 200;
    padding: 20px;
  }
  .modal.show { display: flex; }
  .modal-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 16px;
    width: 100%;
    max-width: 360px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: pop 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .modal-title {
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    letter-spacing: 0.3px;
  }
  .modal-sub {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    margin-top: 2px;
    margin-bottom: 14px;
  }
  .modal-display {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 16px 18px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 30px;
    font-weight: 700;
    text-align: right;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .modal-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    margin-bottom: 12px;
  }
  .mkey {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    padding: 14px 0;
    font-family: inherit;
    font-size: 19px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text);
    border-radius: 8px;
    transition: all 0.15s;
  }
  .mkey:active {
    background: var(--text);
    color: #000;
    transform: scale(0.94);
  }
  .mback { color: var(--text-soft); }
  .mback:active { background: var(--text); color: #000; }
  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .modal-btn {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    background: transparent;
  }
  .modal-btn.cancel {
    color: var(--text-soft);
  }
  .modal-btn.cancel:active { background: var(--bg-elevated); }
  .modal-btn.ok {
    background: var(--text);
    color: #000;
    border-color: var(--text);
  }
  .modal-btn.ok:active { background: var(--text-soft); }
</style>
</head>
<body>
<div class="app" id="app">

  <header>
    <div class="brand">
      <div class="brand-name">ร้านของฉัน</div>
      <div class="brand-sub">เครื่องคิดเงิน</div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="register">คิดเงิน</button>
      <button class="tab" data-tab="history">ประวัติ</button>
    </div>
  </header>

  <!-- ============ REGISTER ============ -->
  <div class="receipt-wrap" id="registerView" style="display:flex;flex-direction:column;flex:1;overflow:hidden">

    <div class="parked-bar" id="parkedBar">
      <span class="parked-label">// พักไว้</span>
    </div>

    <div class="receipt" id="receipt">
      <div class="receipt-header" id="receiptDate">บิลใหม่</div>
      <div id="itemList"></div>
      <div class="empty" id="emptyMsg">
        <div class="empty-icon"></div>
        <span style="color:var(--green)">[ ] ยังไม่มีรายการ</span><br>
        <span style="font-size:11px;color:var(--green-soft)">ใส่ราคา แล้วกด [เพิ่ม]</span>
      </div>
    </div>

    <div class="totals">
      <div class="total-row">
        <span>จำนวนรายการ</span>
        <span id="itemCount">0</span>
      </div>

      <div class="display-top">
        <span class="mode" id="modeLabel">ราคา</span>
        <span id="displayValue">0</span>
      </div>

      <div class="total-row total-grand">
        <span class="label">รวม</span>
        <span id="grandTotal">฿0</span>
      </div>
      <div class="total-row" id="paidRow" style="display:none">
        <span>รับเงิน</span>
        <span id="paidAmount">฿0</span>
      </div>
      <div class="total-row" id="changeRow" style="display:none">
        <span>เงินทอน</span>
        <span id="changeAmount" class="change">฿0</span>
      </div>
      <div class="countdown-bar" id="countdownBar" style="display:none">
        <div class="countdown-fill" id="countdownFill"></div>
      </div>
      <div class="action-row">
        <button class="clear-btn" id="clearBillBtn">เคลียร์บิล</button>
        <button class="hold-btn" id="holdBillBtn">พักบิล</button>
        <button class="exact-btn" id="exactBtn">จ่ายพอดี · จบบิล</button>
      </div>
    </div>

    <div class="keypad" id="keypad">
      <div class="quick-row" id="quickRow"></div>
      <div class="quick-hint">// กดค้างที่ปุ่มลัดเพื่อแก้ราคา</div>

      <div class="grid">
        <button class="key" data-num="7">7</button>
        <button class="key" data-num="8">8</button>
        <button class="key" data-num="9">9</button>
        <button class="key op" data-action="back">⌫</button>

        <button class="key" data-num="4">4</button>
        <button class="key" data-num="5">5</button>
        <button class="key" data-num="6">6</button>
        <button class="key op" data-action="qty">×</button>

        <button class="key" data-num="1">1</button>
        <button class="key" data-num="2">2</button>
        <button class="key" data-num="3">3</button>
        <button class="key op danger" data-action="clear">C</button>

        <button class="key" data-num=".">.</button>
        <button class="key" data-num="0">0</button>
        <button class="key op add" data-action="add">+ เพิ่ม</button>
        <button class="key op pay" data-action="pay">รับเงิน</button>
      </div>
    </div>

  </div>

  <!-- ============ HISTORY ============ -->
  <div class="history-view" id="historyView">
    <div class="summary-bar">
      <span>วันนี้ <strong id="todayCount">0</strong> บิล</span>
      <span>รวม <strong id="todaySum">฿0</strong></span>
    </div>
    <div class="history-note">// เก็บประวัติย้อนหลัง 30 วัน</div>
    <div id="billList"></div>
    <button class="history-clear" id="clearHistory" style="display:none">ล้างประวัติทั้งหมด</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Modal แก้ราคาปุ่มลัด -->
<div class="modal" id="editModal">
  <div class="modal-card">
    <div class="modal-title">ตั้งราคาปุ่มลัด</div>
    <div class="modal-sub" id="modalSub">ปุ่มที่ 1</div>
    <div class="modal-display" id="modalDisplay">0</div>
    <div class="modal-grid">
      <button class="mkey" data-mn="7">7</button>
      <button class="mkey" data-mn="8">8</button>
      <button class="mkey" data-mn="9">9</button>
      <button class="mkey" data-mn="4">4</button>
      <button class="mkey" data-mn="5">5</button>
      <button class="mkey" data-mn="6">6</button>
      <button class="mkey" data-mn="1">1</button>
      <button class="mkey" data-mn="2">2</button>
      <button class="mkey" data-mn="3">3</button>
      <button class="mkey" data-mn="0">0</button>
      <button class="mkey" data-mn=".">.</button>
      <button class="mkey mback" data-maction="back">⌫</button>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" data-maction="cancel">ยกเลิก</button>
      <button class="modal-btn ok" data-maction="ok">บันทึก</button>
    </div>
  </div>
</div>

<script>
  // ========== STATE ==========
  let currentItems = [];     // [{price, qty}]
  let history = [];
  let display = '0';
  let mode = 'price';        // 'price' | 'qty' | 'pay'
  let pendingPrice = null;
  let paidValue = null;
  let quickValues = [20, 50, 100, 500, 1000];  // ปุ่มลัด แก้ได้
  let parkedBills = [];      // [{id, name, items, time}]
  const STORAGE_KEY = 'pos:bills';
  const QUICK_KEY = 'pos:quick';
  const CURRENT_KEY = 'pos:current';
  const PARKED_KEY = 'pos:parked';

  // ========== HELPERS ==========
  const $ = id => document.getElementById(id);
  const fmt = n => '฿' + Number(n).toLocaleString('th-TH', { maximumFractionDigits: 2 });
  const total = () => currentItems.reduce((s, x) => s + x.price * x.qty, 0);
  const itemCount = () => currentItems.reduce((s, x) => s + x.qty, 0);
  const todayKey = () => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };
  // แปลง bill.time (ISO/UTC) เป็น local-date string เพื่อเทียบกับ todayKey
  const localDateKey = (iso) => {
    const d = new Date(iso);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };

  function toast(msg, duration = 1200) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), duration);
  }

  // ========== STORAGE ==========
  async function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      history = raw ? JSON.parse(raw) : [];
    } catch (e) { history = []; }
    pruneOldHistory();
  }

  function pruneOldHistory() {
    const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
    const before = history.length;
    history = history.filter(b => new Date(b.time).getTime() >= cutoff);
    if (history.length !== before) {
      saveHistory();
    }
  }

  async function saveHistory() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    } catch (e) { console.error('save history failed', e); }
  }
  async function loadQuick() {
    try {
      const raw = localStorage.getItem(QUICK_KEY);
      if (raw) quickValues = JSON.parse(raw);
    } catch (e) {}
  }
  async function saveQuick() {
    try {
      localStorage.setItem(QUICK_KEY, JSON.stringify(quickValues));
    } catch (e) { console.error('save quick failed', e); }
  }
  function saveCurrent() {
    try {
      localStorage.setItem(CURRENT_KEY, JSON.stringify(currentItems));
    } catch (e) {}
  }
  function loadCurrent() {
    try {
      const raw = localStorage.getItem(CURRENT_KEY);
      if (raw) currentItems = JSON.parse(raw);
    } catch (e) {}
  }
  function clearCurrent() {
    try { localStorage.removeItem(CURRENT_KEY); } catch (e) {}
  }
  function loadParked() {
    try {
      const raw = localStorage.getItem(PARKED_KEY);
      parkedBills = raw ? JSON.parse(raw) : [];
    } catch (e) { parkedBills = []; }
  }
  function saveParked() {
    try {
      localStorage.setItem(PARKED_KEY, JSON.stringify(parkedBills));
    } catch (e) { console.error('save parked failed', e); }
  }

  // ========== RENDER ==========
  let lastTotal = 0;

  function renderReceipt() {
    const list = $('itemList');
    const empty = $('emptyMsg');
    list.innerHTML = '';
    if (currentItems.length === 0) {
      empty.style.display = 'block';
      $('receiptDate').textContent = 'บิลใหม่';
    } else {
      empty.style.display = 'none';
      const now = new Date();
      $('receiptDate').textContent = `กำลังคิด · ${now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}`;
      currentItems.forEach((it, i) => {
        const row = document.createElement('div');
        row.className = 'item';
        row.innerHTML = `
          <span class="item-label">
            <span class="item-num">${String(i+1).padStart(2,'0')}</span>${fmt(it.price)}
          </span>
          <span class="qty-ctrl">
            <button class="qty-btn" data-dec="${i}">−</button>
            <span class="qty-val">${it.qty}</span>
            <button class="qty-btn" data-inc="${i}">+</button>
          </span>
          <span class="item-price">${fmt(it.price * it.qty)}</span>
          <button class="item-del" data-del="${i}">×</button>
        `;
        list.appendChild(row);
      });
    }
    $('itemCount').textContent = itemCount();
    const newTotal = total();
    $('grandTotal').textContent = fmt(newTotal);
    if (newTotal !== lastTotal && newTotal > 0) {
      const grand = $('grandTotal');
      grand.classList.remove('bump');
      void grand.offsetWidth;
      grand.classList.add('bump');
    }
    lastTotal = newTotal;
    $('exactBtn').disabled = currentItems.length === 0;
    $('clearBillBtn').disabled = currentItems.length === 0;
    $('holdBillBtn').disabled = currentItems.length === 0;

    // payment area
    if (mode === 'pay' && paidValue !== null) {
      const change = paidValue - total();
      $('paidRow').style.display = 'flex';
      $('changeRow').style.display = 'flex';
      $('paidAmount').textContent = fmt(paidValue);
      $('changeAmount').textContent = (change < 0 ? '-' : '') + fmt(Math.abs(change));
      $('changeAmount').className = 'change' + (change < 0 ? ' negative' : '');
    } else {
      $('paidRow').style.display = 'none';
      $('changeRow').style.display = 'none';
    }

    let modeText = 'ราคา';
    if (mode === 'qty') modeText = `จำนวน × ${fmt(pendingPrice)}`;
    else if (mode === 'pay') modeText = 'รับเงิน';
    $('modeLabel').textContent = modeText;
    document.querySelector('.app').classList.toggle('pay-mode', mode === 'pay');
    document.querySelector('.app').classList.toggle('qty-mode', mode === 'qty');
    $('displayValue').textContent = display === '' ? '0' : display;

    // auto-scroll ลงล่างเพื่อให้รายการล่าสุดเห็นได้เสมอ
    const r = $('receipt');
    r.scrollTop = r.scrollHeight;

    // บันทึกบิลปัจจุบัน (กันรีเฟรชหาย)
    saveCurrent();
  }

  function renderHistory() {
    const list = $('billList');
    list.innerHTML = '';
    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty"><div style="font-size:14px;color:var(--green-soft);margin-bottom:8px">$ ดูประวัติ</div>ยังไม่มีบิล</div>';
      $('clearHistory').style.display = 'none';
    } else {
      $('clearHistory').style.display = 'block';
      // newest first
      [...history].reverse().forEach(b => {
        const d = new Date(b.time);
        const card = document.createElement('div');
        card.className = 'bill-card';
        const summary = b.items.map(it => {
          if (typeof it === 'number') return Number(it).toLocaleString('th-TH');
          return it.qty > 1
            ? `${it.qty}×${Number(it.price).toLocaleString('th-TH')}`
            : Number(it.price).toLocaleString('th-TH');
        }).join(' + ');
        const itemsCount = b.items.reduce((s, it) =>
          s + (typeof it === 'number' ? 1 : it.qty), 0);
        card.innerHTML = `
          <div class="bill-head">
            <span>${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</span>
            <span class="bill-total">${fmt(b.total)}</span>
          </div>
          <div class="bill-meta">
            ${itemsCount} ชิ้น · ${summary}
            ${b.paid ? `<br>รับ ${fmt(b.paid)} · ทอน ${fmt(b.paid - b.total)}` : ''}
          </div>
        `;
        list.appendChild(card);
      });
    }
    // today summary
    const today = todayKey();
    const todays = history.filter(b => localDateKey(b.time) === today);
    $('todayCount').textContent = todays.length;
    $('todaySum').textContent = fmt(todays.reduce((s,b)=>s+b.total, 0));
  }

  // ========== KEYPAD LOGIC ==========
  function inputDigit(d) {
    if (d === '.' && display.includes('.')) return;
    if (display === '0' && d !== '.') display = d;
    else display += d;
    renderReceipt();
    // flash จอเพื่อ feedback
    const dv = $('displayValue');
    dv.classList.remove('flash');
    void dv.offsetWidth;
    dv.classList.add('flash');
    setTimeout(() => dv.classList.remove('flash'), 100);
  }
  function backspace() {
    display = display.length <= 1 ? '0' : display.slice(0, -1);
    renderReceipt();
  }
  function clearDisplay() {
    display = '0';
    if (mode !== 'price') {
      mode = 'price';
      pendingPrice = null;
      paidValue = null;
    }
    renderReceipt();
  }
  function quickAmount(n) {
    const price = Number(n);
    // ถ้ารายการล่าสุดราคาเดียวกัน → เพิ่มจำนวน, ไม่งั้น push ใหม่
    const last = currentItems[currentItems.length - 1];
    if (last && last.price === price) {
      last.qty++;
    } else {
      currentItems.push({ price, qty: 1 });
    }
    // reset display + ออกจาก pay mode ถ้าอยู่
    display = '0';
    if (mode === 'pay') { mode = 'price'; paidValue = null; }
    renderReceipt();
  }
  function enterQtyMode() {
    if (mode === 'pay') return;
    if (mode === 'qty') {
      // toggle back
      mode = 'price';
      display = String(pendingPrice);
      pendingPrice = null;
      renderReceipt();
      return;
    }
    const v = parseFloat(display);
    if (!v || v <= 0) { toast('! ใส่ราคาก่อน'); return; }
    pendingPrice = v;
    mode = 'qty';
    display = '0';
    renderReceipt();
    toast('> ใส่จำนวน');
  }
  function addItem() {
    if (mode === 'qty') {
      const q = parseInt(display, 10);
      if (!q || q <= 0) { toast('! ใส่จำนวน'); return; }
      currentItems.push({ price: pendingPrice, qty: q });
      mode = 'price';
      pendingPrice = null;
      display = '0';
      renderReceipt();
      return;
    }
    const v = parseFloat(display);
    if (!v || v <= 0) { toast('! ใส่ราคาก่อน'); return; }
    currentItems.push({ price: v, qty: 1 });
    display = '0';
    mode = 'price';
    paidValue = null;
    renderReceipt();
  }
  function finalizeBill(paid) {
    const t = total();
    const bill = {
      time: new Date().toISOString(),
      items: [...currentItems],
      total: t,
      paid: paid
    };
    history.push(bill);
    pruneOldHistory();
    saveHistory();

    // success flash
    const totalsEl = document.querySelector('.totals');
    totalsEl.classList.remove('success-flash');
    void totalsEl.offsetWidth;
    totalsEl.classList.add('success-flash');
    setTimeout(() => totalsEl.classList.remove('success-flash'), 800);
    const change = paid - t;
    if (change > 0) {
      paidValue = paid;
      mode = 'pay';
      renderReceipt();
      // โชว์เงินทอน 5 วินาที พร้อม countdown bar
      toast(`เงินทอน ${fmt(change)}`, 5000);
      const bar = $('countdownBar');
      const fill = $('countdownFill');
      bar.style.display = 'block';
      // restart animation
      fill.style.animation = 'none';
      void fill.offsetWidth;
      fill.style.animation = 'countdownShrink 5s linear forwards';
      setTimeout(() => {
        bar.style.display = 'none';
        resetBill();
        renderHistory();
      }, 5000);
    } else {
      toast('✓ จ่ายพอดี');
      resetBill();
      renderHistory();
    }
  }

  function resetBill() {
    currentItems = [];
    display = '0';
    mode = 'price';
    pendingPrice = null;
    paidValue = null;
    clearCurrent();
    renderReceipt();
  }

  // ========== PARKED BILLS ==========
  function renderParked() {
    const bar = $('parkedBar');
    // ลบ chip เก่า (เก็บแค่ label)
    bar.querySelectorAll('.parked-chip').forEach(el => el.remove());

    if (parkedBills.length === 0) {
      bar.classList.remove('active');
      return;
    }
    bar.classList.add('active');

    parkedBills.forEach(bill => {
      const t = bill.items.reduce((s, x) => s + x.price * x.qty, 0);
      const chip = document.createElement('div');
      chip.className = 'parked-chip';
      chip.dataset.id = bill.id;
      chip.innerHTML = `
        <span class="parked-chip-name">${bill.name}</span>
        <span class="parked-chip-total">${fmt(t)}</span>
        <span class="parked-chip-x" data-rm="${bill.id}">×</span>
      `;
      bar.appendChild(chip);
    });
  }

  function holdBill() {
    if (currentItems.length === 0) { toast('! ยังไม่มีรายการ'); return; }

    // หาเลขบิลถัดไป (ไม่ซ้ำที่กำลังพักอยู่)
    const usedNums = new Set(parkedBills.map(b => b._num).filter(n => n));
    let n = 1;
    while (usedNums.has(n)) n++;

    const bill = {
      id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      _num: n,
      name: `บิล #${n}`,
      items: [...currentItems],
      time: new Date().toISOString()
    };
    parkedBills.push(bill);
    saveParked();
    resetBill();
    renderParked();
    toast(`✓ พักบิลไว้ที่ ${bill.name}`);
  }

  function resumeBill(id) {
    const idx = parkedBills.findIndex(b => b.id === id);
    if (idx === -1) return;

    // ถ้ามีรายการในบิลปัจจุบันที่ยังไม่จบ — พักอันปัจจุบันก่อน
    if (currentItems.length > 0) {
      const usedNums = new Set(parkedBills.map(b => b._num).filter(x => x));
      let n = 1;
      while (usedNums.has(n)) n++;
      parkedBills.push({
        id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        _num: n,
        name: `บิล #${n}`,
        items: [...currentItems],
        time: new Date().toISOString()
      });
    }

    const bill = parkedBills[idx];
    parkedBills.splice(idx, 1);
    currentItems = [...bill.items];
    display = '0';
    mode = 'price';
    pendingPrice = null;
    paidValue = null;
    saveParked();
    saveCurrent();
    renderParked();
    renderReceipt();
    toast(`> เรียก ${bill.name} กลับมา`);
  }

  function removeParked(id) {
    const idx = parkedBills.findIndex(b => b.id === id);
    if (idx === -1) return;
    if (!confirm(`ลบ ${parkedBills[idx].name} ทิ้ง?`)) return;
    parkedBills.splice(idx, 1);
    saveParked();
    renderParked();
    toast('✓ ลบบิลที่พักแล้ว');
  }

  function payExact() {
    if (currentItems.length === 0) { toast('! ยังไม่มีรายการ'); return; }
    finalizeBill(total());
  }

  function startPay() {
    if (currentItems.length === 0) { toast('! ยังไม่มีรายการ'); return; }
    if (mode !== 'pay') {
      mode = 'pay';
      display = '0';
      paidValue = null;
      renderReceipt();
      toast('> ใส่จำนวนเงินที่รับ');
      return;
    }
    const v = parseFloat(display);
    if (!v || v <= 0) { toast('! ใส่จำนวนเงินที่รับ'); return; }
    if (v < total()) {
      toast('! เงินไม่พอ');
      const totalsEl = document.querySelector('.totals');
      totalsEl.classList.remove('error-flash');
      void totalsEl.offsetWidth;
      totalsEl.classList.add('error-flash');
      setTimeout(() => totalsEl.classList.remove('error-flash'), 400);
      return;
    }
    finalizeBill(v);
  }

  // ========== EVENTS ==========
  document.querySelectorAll('[data-num]').forEach(b =>
    b.addEventListener('click', () => inputDigit(b.dataset.num)));

  function renderQuick() {
    const row = $('quickRow');
    row.innerHTML = '';
    quickValues.forEach((v, i) => {
      const btn = document.createElement('button');
      btn.className = 'quick';
      btn.textContent = v;
      btn.dataset.idx = i;
      let timer = null, longPress = false;
      const start = (e) => {
        longPress = false;
        timer = setTimeout(() => {
          longPress = true;
          editQuick(i);
        }, 500);
      };
      const cancel = () => clearTimeout(timer);
      btn.addEventListener('touchstart', start, { passive: true });
      btn.addEventListener('touchend', cancel);
      btn.addEventListener('touchmove', cancel);
      btn.addEventListener('mousedown', start);
      btn.addEventListener('mouseup', cancel);
      btn.addEventListener('mouseleave', cancel);
      btn.addEventListener('click', () => {
        if (longPress) return;
        quickAmount(quickValues[i]);
      });
      // right-click on desktop ก็แก้ได้
      btn.addEventListener('contextmenu', e => { e.preventDefault(); editQuick(i); });
      row.appendChild(btn);
    });
  }

  let editingIdx = -1;
  let modalDisplay = '0';

  function editQuick(i) {
    editingIdx = i;
    modalDisplay = String(quickValues[i]);
    $('modalSub').textContent = `ปุ่มที่ ${i+1}`;
    $('modalDisplay').textContent = modalDisplay;
    $('editModal').classList.add('show');
  }

  function closeModal() {
    $('editModal').classList.remove('show');
    editingIdx = -1;
  }

  function modalInput(d) {
    if (d === '.' && modalDisplay.includes('.')) return;
    if (modalDisplay === '0' && d !== '.') modalDisplay = d;
    else modalDisplay += d;
    $('modalDisplay').textContent = modalDisplay;
  }
  function modalBack() {
    modalDisplay = modalDisplay.length <= 1 ? '0' : modalDisplay.slice(0, -1);
    $('modalDisplay').textContent = modalDisplay;
  }
  function modalConfirm() {
    const n = parseFloat(modalDisplay);
    if (!n || n <= 0) { toast('! ราคาต้องมากกว่า 0'); return; }
    quickValues[editingIdx] = n;
    saveQuick();
    renderQuick();
    closeModal();
    toast('✓ บันทึกแล้ว');
  }

  // modal events
  document.querySelectorAll('#editModal [data-mn]').forEach(b =>
    b.addEventListener('click', () => modalInput(b.dataset.mn)));
  document.querySelector('[data-maction="back"]').addEventListener('click', modalBack);
  document.querySelector('[data-maction="cancel"]').addEventListener('click', closeModal);
  document.querySelector('[data-maction="ok"]').addEventListener('click', modalConfirm);
  // tap backdrop to close
  $('editModal').addEventListener('click', e => {
    if (e.target === $('editModal')) closeModal();
  });
  document.querySelector('[data-action="back"]').addEventListener('click', backspace);
  document.querySelector('[data-action="clear"]').addEventListener('click', clearDisplay);
  document.querySelector('[data-action="qty"]').addEventListener('click', enterQtyMode);
  document.querySelector('[data-action="add"]').addEventListener('click', addItem);
  document.querySelector('[data-action="pay"]').addEventListener('click', startPay);
  $('exactBtn').addEventListener('click', payExact);
  $('clearBillBtn').addEventListener('click', () => {
    if (currentItems.length === 0) { toast('! ยังไม่มีรายการ'); return; }
    if (!confirm('เคลียร์บิลปัจจุบัน?')) return;
    resetBill();
    toast('✓ ล้างบิลแล้ว');
  });
  $('holdBillBtn').addEventListener('click', holdBill);

  // parked bar: คลิก chip = เรียกคืน, คลิก × = ลบ
  $('parkedBar').addEventListener('click', e => {
    const rmId = e.target.dataset?.rm;
    if (rmId) {
      e.stopPropagation();
      removeParked(rmId);
      return;
    }
    const chip = e.target.closest('.parked-chip');
    if (chip && chip.dataset.id) {
      resumeBill(chip.dataset.id);
    }
  });

  // delete + adjust qty
  $('itemList').addEventListener('click', e => {
    const t = e.target;
    if (t.dataset?.del !== undefined) {
      currentItems.splice(Number(t.dataset.del), 1);
      renderReceipt();
    } else if (t.dataset?.inc !== undefined) {
      currentItems[Number(t.dataset.inc)].qty++;
      renderReceipt();
    } else if (t.dataset?.dec !== undefined) {
      const i = Number(t.dataset.dec);
      if (currentItems[i].qty > 1) {
        currentItems[i].qty--;
      } else {
        currentItems.splice(i, 1);
      }
      renderReceipt();
    }
  });

  // tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const isHist = t.dataset.tab === 'history';
      $('registerView').style.display = isHist ? 'none' : 'flex';
      $('historyView').classList.toggle('active', isHist);
      if (isHist) renderHistory();
    });
  });

  // clear history
  $('clearHistory').addEventListener('click', async () => {
    if (!confirm('ล้างประวัติทั้งหมด?')) return;
    history = [];
    await saveHistory();
    renderHistory();
  });

  // ========== INIT ==========
  (async () => {
    await loadHistory();
    await loadQuick();
    loadCurrent();
    loadParked();
    renderQuick();
    renderReceipt();
    renderHistory();
    renderParked();
  })();
</script>
</body>
</html>
