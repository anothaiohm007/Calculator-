<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>เครื่องคิดเงินหน้าร้าน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6f0;
    --bg-soft: #f7eee5;
    --bg-card: #ffffff;
    --pink: #f4b3c8;
    --pink-deep: #e88aa8;
    --peach: #f9c5a0;
    --peach-deep: #f0a378;
    --mint: #a8d8c0;
    --mint-deep: #7fc4a4;
    --sky: #b3d4f0;
    --sky-deep: #8ab8e0;
    --lavender: #c8b8e0;
    --lavender-deep: #a98fcb;
    --yellow: #f5dba0;
    --yellow-deep: #e8c474;
    --coral: #f0a098;
    --coral-deep: #e07a70;
    --text: #5d4e60;
    --text-soft: #8a7d8d;
    --text-faint: #b5a8b8;
    --line: rgba(168,138,200,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Bai Jamjuree', 'JetBrains Mono', sans-serif;
    background: #efe4d4;
    color: var(--text);
    user-select: none;
  }
  body {
    background:
      radial-gradient(ellipse at 30% 20%, #f8e0e8 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, #e0eef0 0%, transparent 50%),
      #fdf6f0;
    display: flex;
    justify-content: center;
    align-items: stretch;
  }

  /* ===== Animations ===== */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes softPulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(232,138,168,0.15); }
    50% { box-shadow: 0 6px 28px rgba(232,138,168,0.25); }
  }
  @keyframes gradientFlow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes blobMove {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { transform: scale(0.85); opacity: 0; }
    60% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .app {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    height: 100dvh;
    background: var(--bg);
    box-shadow: 0 0 60px rgba(168,138,200,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Floating blob backgrounds */
  .app::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(244,179,200,0.25), transparent 70%);
    top: 10%; left: -50px;
    animation: blobMove 12s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }
  .app::after {
    content: '';
    position: absolute;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(168,216,192,0.25), transparent 70%);
    bottom: 20%; right: -60px;
    animation: blobMove 15s ease-in-out infinite reverse;
    pointer-events: none;
    z-index: 1;
  }
  .app > * { position: relative; z-index: 2; }

  /* ===== HEADER ===== */
  header {
    padding: 14px 18px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .brand-name {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.3px;
    background: linear-gradient(120deg, var(--pink-deep), var(--lavender-deep), var(--sky-deep));
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: gradientFlow 6s ease-in-out infinite;
  }
  .brand-sub {
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .tabs {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    box-shadow: inset 0 1px 2px rgba(168,138,200,0.1);
  }
  .tab {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    cursor: pointer;
    color: var(--text-soft);
    border-radius: 7px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .tab.active {
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    color: #fff;
    box-shadow: 0 2px 8px rgba(232,138,168,0.3);
  }

  /* ===== RECEIPT ===== */
  .receipt {
    flex: 1;
    overflow-y: auto;
    padding: 12px 18px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    min-height: 60px;
  }
  .receipt-header {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 2px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--line);
  }
  .item {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 10px;
    align-items: center;
    padding: 8px 4px;
    margin-bottom: 4px;
    font-size: 14px;
    color: var(--text);
    background: rgba(255,255,255,0.5);
    border-radius: 10px;
    animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 2px 6px rgba(168,138,200,0.06);
  }
  .item-label { display: flex; align-items: center; min-width: 0; padding-left: 8px; }
  .item-num {
    color: var(--lavender-deep);
    font-size: 11px;
    width: 28px;
    font-weight: 600;
  }
  .item-price {
    font-weight: 700;
    color: var(--peach-deep);
    text-align: right;
    font-size: 15px;
  }
  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 2px;
    background: linear-gradient(135deg, rgba(244,179,200,0.18), rgba(200,184,224,0.18));
    border-radius: 8px;
    padding: 3px;
  }
  .qty-btn {
    width: 24px;
    height: 24px;
    border: none;
    background: rgba(255,255,255,0.8);
    color: var(--pink-deep);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .qty-btn:active {
    transform: scale(0.9);
    background: var(--pink);
    color: #fff;
  }
  .qty-val {
    min-width: 22px;
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
    padding: 0 2px;
  }
  .item-del {
    background: rgba(240,160,152,0.15);
    border: none;
    color: var(--coral-deep);
    font-size: 16px;
    cursor: pointer;
    padding: 0;
    font-weight: 600;
    width: 26px;
    height: 26px;
    font-family: inherit;
    border-radius: 8px;
    margin-right: 6px;
    transition: all 0.2s;
  }
  .item-del:active {
    background: var(--coral);
    color: #fff;
    transform: scale(0.9);
  }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-faint);
    font-size: 13px;
    line-height: 1.7;
  }
  .empty-icon {
    font-size: 36px;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
  }

  /* ===== TOTALS ===== */
  .totals {
    padding: 12px 18px 14px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--line);
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 14px;
    color: var(--text-soft);
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .total-grand {
    font-size: 30px;
    font-weight: 700;
    margin-top: 6px;
    background: linear-gradient(120deg, var(--peach-deep), var(--pink-deep), var(--lavender-deep));
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: gradientFlow 5s ease-in-out infinite;
  }
  .total-grand .label {
    font-size: 13px;
    -webkit-text-fill-color: var(--text-soft);
    color: var(--text-soft);
    letter-spacing: 2px;
    font-weight: 500;
  }
  .change {
    color: var(--mint-deep);
    font-weight: 700;
  }
  .change.negative {
    color: var(--coral-deep);
  }
  .pay-mode #changeAmount {
    font-size: 26px;
    color: var(--mint-deep);
    animation: pop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .pay-mode #paidRow, .pay-mode #changeRow {
    background: linear-gradient(90deg, rgba(168,216,192,0.15), transparent);
    border-left: 3px solid var(--mint);
    padding: 6px 12px;
    margin: 3px -6px;
    border-radius: 0 8px 8px 0;
  }
  .countdown-bar {
    height: 4px;
    background: rgba(168,216,192,0.2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .countdown-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--mint-deep), var(--sky-deep), var(--pink-deep));
    background-size: 200% 100%;
    transform-origin: left;
    animation: countdownShrink 5s linear forwards, gradientFlow 2s linear infinite;
  }
  @keyframes countdownShrink {
    from { transform: scaleX(1); }
    to { transform: scaleX(0); }
  }
  .exact-btn {
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: linear-gradient(135deg, var(--mint), var(--sky));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(127,196,164,0.35);
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
    text-shadow: 0 1px 1px rgba(0,0,0,0.08);
  }
  .exact-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  .exact-btn:active {
    transform: translateY(1px);
    box-shadow: 0 2px 8px rgba(127,196,164,0.35);
  }
  .exact-btn:disabled {
    background: rgba(0,0,0,0.06);
    color: var(--text-faint);
    box-shadow: none;
    cursor: not-allowed;
    text-shadow: none;
  }
  .exact-btn:disabled::before { display: none; }

  /* ===== KEYPAD ===== */
  .keypad {
    padding: 10px 14px 14px;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(8px);
    border-top: 1px solid var(--line);
  }
  .display-top {
    background: linear-gradient(135deg, #ffffff, #f9f3ec);
    color: var(--text);
    margin: 6px 0 10px;
    padding: 16px 20px;
    border: 2px solid var(--lavender);
    border-radius: 14px;
    font-family: inherit;
    font-size: 40px;
    font-weight: 700;
    text-align: right;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(168,138,200,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
    line-height: 1;
    letter-spacing: 1px;
    position: relative;
    transition: all 0.3s;
    animation: softPulse 3s ease-in-out infinite;
  }
  .display-top::after {
    content: '|';
    color: var(--lavender-deep);
    animation: blink 1.2s ease-in-out infinite;
    margin-left: 2px;
    font-weight: 300;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0.2; }
  }
  .display-top .mode {
    font-size: 11px;
    color: var(--lavender-deep);
    letter-spacing: 2px;
    margin-right: auto;
    font-weight: 700;
    align-self: flex-start;
    margin-top: 4px;
    background: rgba(200,184,224,0.2);
    padding: 3px 8px;
    border-radius: 6px;
  }

  #displayValue {
    transition: color 0.15s, transform 0.15s;
    background: linear-gradient(120deg, var(--text), var(--lavender-deep));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #displayValue.flash {
    transform: scale(1.05);
  }

  .pay-mode .display-top {
    border-color: var(--peach);
    background: linear-gradient(135deg, #fff8f0, #ffeed8);
  }
  .pay-mode .display-top .mode {
    color: var(--peach-deep);
    background: rgba(249,197,160,0.25);
  }
  .pay-mode #displayValue {
    background: linear-gradient(120deg, var(--peach-deep), var(--coral-deep));
    -webkit-background-clip: text;
    background-clip: text;
  }
  .pay-mode .display-top::after { color: var(--peach-deep); }

  .qty-mode .display-top {
    border-color: var(--mint);
    background: linear-gradient(135deg, #f0fbf5, #e0f5ea);
  }
  .qty-mode .display-top .mode {
    color: var(--mint-deep);
    background: rgba(168,216,192,0.3);
  }
  .qty-mode #displayValue {
    background: linear-gradient(120deg, var(--mint-deep), var(--sky-deep));
    -webkit-background-clip: text;
    background-clip: text;
  }
  .qty-mode .display-top::after { color: var(--mint-deep); }

  .quick-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }
  .quick {
    background: linear-gradient(135deg, var(--peach), var(--yellow));
    border: none;
    color: #fff;
    padding: 10px 4px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 2px 8px rgba(240,163,120,0.3);
    text-shadow: 0 1px 1px rgba(0,0,0,0.08);
  }
  .quick:nth-child(2) { background: linear-gradient(135deg, var(--pink), var(--coral)); box-shadow: 0 2px 8px rgba(244,179,200,0.35); }
  .quick:nth-child(3) { background: linear-gradient(135deg, var(--mint), var(--sky)); box-shadow: 0 2px 8px rgba(168,216,192,0.35); }
  .quick:nth-child(4) { background: linear-gradient(135deg, var(--lavender), var(--pink)); box-shadow: 0 2px 8px rgba(200,184,224,0.35); }
  .quick:nth-child(5) { background: linear-gradient(135deg, var(--sky), var(--lavender)); box-shadow: 0 2px 8px rgba(179,212,240,0.35); }
  .quick:active {
    transform: translateY(2px) scale(0.96);
    filter: brightness(1.05);
  }
  .quick-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .key {
    background: rgba(255,255,255,0.85);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 14px 0;
    border-radius: 12px;
    font-family: inherit;
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 2px 6px rgba(168,138,200,0.08);
  }
  .key:active {
    transform: translateY(2px) scale(0.96);
    background: linear-gradient(135deg, var(--lavender), var(--pink));
    color: #fff;
    box-shadow: 0 1px 3px rgba(168,138,200,0.15);
  }
  .key.op {
    color: var(--sky-deep);
    background: linear-gradient(135deg, #ffffff, #f0f7fc);
  }
  .key.op:active { background: linear-gradient(135deg, var(--sky), var(--lavender)); color: #fff; }

  .key.add {
    background: linear-gradient(135deg, var(--mint), var(--sky));
    color: #fff;
    font-size: 16px;
    letter-spacing: 0.5px;
    box-shadow: 0 3px 10px rgba(127,196,164,0.35);
    text-shadow: 0 1px 1px rgba(0,0,0,0.08);
  }
  .key.add:active {
    transform: translateY(2px) scale(0.96);
    filter: brightness(1.05);
  }

  .key.pay {
    background: linear-gradient(135deg, var(--peach), var(--coral));
    color: #fff;
    font-size: 16px;
    letter-spacing: 0.5px;
    box-shadow: 0 3px 10px rgba(240,163,120,0.4);
    text-shadow: 0 1px 1px rgba(0,0,0,0.08);
  }
  .key.pay:active {
    transform: translateY(2px) scale(0.96);
    filter: brightness(1.05);
  }

  .key.danger {
    color: var(--coral-deep);
    background: linear-gradient(135deg, #ffffff, #fef0ee);
  }
  .key.danger:active { background: linear-gradient(135deg, var(--coral), var(--pink)); color: #fff; }

  /* ===== HISTORY ===== */
  .history-view {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    display: none;
  }
  .history-view.active { display: block; }
  .history-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
  }
  .bill-card {
    border: 1px solid var(--line);
    padding: 12px 14px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.7);
    border-radius: 12px;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(168,138,200,0.06);
    animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .bill-card:active {
    transform: scale(0.98);
    box-shadow: 0 4px 14px rgba(168,138,200,0.15);
  }
  .bill-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .bill-total {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(120deg, var(--peach-deep), var(--pink-deep));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .bill-meta {
    font-size: 11px;
    color: var(--text-soft);
    margin-top: 4px;
    line-height: 1.5;
  }
  .history-clear {
    width: 100%;
    margin-top: 12px;
    padding: 11px;
    background: rgba(240,160,152,0.12);
    border: 1px solid rgba(240,160,152,0.4);
    color: var(--coral-deep);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    border-radius: 10px;
    transition: all 0.2s;
  }
  .history-clear:active { background: var(--coral); color: #fff; }
  .summary-bar {
    background: linear-gradient(135deg, rgba(244,179,200,0.2), rgba(168,216,192,0.2));
    color: var(--text);
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    box-shadow: 0 2px 10px rgba(168,138,200,0.08);
  }
  .summary-bar strong {
    font-size: 18px;
    background: linear-gradient(120deg, var(--pink-deep), var(--lavender-deep));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .history-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30%;
    left: 50%;
    transform: translateX(-50%) translateY(20px) scale(0.9);
    background: linear-gradient(135deg, var(--lavender), var(--pink));
    color: #fff;
    padding: 14px 26px;
    font-size: 14px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 8px 30px rgba(168,138,200,0.4);
    font-family: inherit;
    letter-spacing: 0.3px;
    border-radius: 14px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

  /* ===== MODAL ===== */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(168,138,200,0.25);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 200;
    padding: 20px;
  }
  .modal.show { display: flex; }
  .modal-card {
    background: var(--bg-card);
    border-radius: 18px;
    width: 100%;
    max-width: 360px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(168,138,200,0.3);
    animation: pop 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .modal-title {
    font-weight: 700;
    font-size: 16px;
    background: linear-gradient(120deg, var(--pink-deep), var(--lavender-deep));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 0.3px;
  }
  .modal-sub {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    margin-top: 2px;
    margin-bottom: 14px;
  }
  .modal-display {
    background: linear-gradient(135deg, #fff8f0, #f9eee0);
    color: var(--peach-deep);
    border: 2px solid var(--peach);
    padding: 16px 18px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 30px;
    font-weight: 700;
    text-align: right;
    margin-bottom: 14px;
    letter-spacing: 1px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
  }
  .modal-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }
  .mkey {
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--line);
    padding: 14px 0;
    font-family: inherit;
    font-size: 19px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text);
    border-radius: 10px;
    transition: all 0.15s;
    box-shadow: 0 1px 3px rgba(168,138,200,0.08);
  }
  .mkey:active {
    background: linear-gradient(135deg, var(--lavender), var(--pink));
    color: #fff;
    transform: scale(0.94);
  }
  .mback { color: var(--sky-deep); }
  .mback:active { background: linear-gradient(135deg, var(--sky), var(--lavender)); }
  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .modal-btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }
  .modal-btn.cancel {
    background: rgba(0,0,0,0.05);
    color: var(--text-soft);
  }
  .modal-btn.cancel:active { background: rgba(0,0,0,0.1); }
  .modal-btn.ok {
    background: linear-gradient(135deg, var(--mint), var(--sky));
    color: #fff;
    box-shadow: 0 3px 10px rgba(127,196,164,0.3);
    text-shadow: 0 1px 1px rgba(0,0,0,0.08);
  }
  .modal-btn.ok:active { transform: translateY(1px); }
</style>
</head>
<body>
<div class="app" id="app">

  <header>
    <div class="brand">
      <div class="brand-name">ร้านของฉัน</div>
      <div class="brand-sub">เครื่องคิดเงิน</div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="register">คิดเงิน</button>
      <button class="tab" data-tab="history">ประวัติ</button>
    </div>
  </header>

  <!-- ============ REGISTER ============ -->
  <div class="receipt-wrap" id="registerView" style="display:flex;flex-direction:column;flex:1;overflow:hidden">

    <div class="receipt" id="receipt">
      <div class="receipt-header" id="receiptDate">บิลใหม่</div>
      <div id="itemList"></div>
      <div class="empty" id="emptyMsg">
        <div class="empty-icon"></div>
        <span style="color:var(--green)">[ ] ยังไม่มีรายการ</span><br>
        <span style="font-size:11px;color:var(--green-soft)">ใส่ราคา แล้วกด [เพิ่ม]</span>
      </div>
    </div>

    <div class="totals">
      <div class="total-row">
        <span>จำนวนรายการ</span>
        <span id="itemCount">0</span>
      </div>

      <div class="display-top">
        <span class="mode" id="modeLabel">ราคา</span>
        <span id="displayValue">0</span>
      </div>

      <div class="total-row total-grand">
        <span class="label">รวม</span>
        <span id="grandTotal">฿0</span>
      </div>
      <div class="total-row" id="paidRow" style="display:none">
        <span>รับเงิน</span>
        <span id="paidAmount">฿0</span>
      </div>
      <div class="total-row" id="changeRow" style="display:none">
        <span>เงินทอน</span>
        <span id="changeAmount" class="change">฿0</span>
      </div>
      <div class="countdown-bar" id="countdownBar" style="display:none">
        <div class="countdown-fill" id="countdownFill"></div>
      </div>
      <button class="exact-btn" id="exactBtn">จ่ายพอดี · จบบิล</button>
    </div>

    <div class="keypad" id="keypad">
      <div class="quick-row" id="quickRow"></div>
      <div class="quick-hint">// กดค้างที่ปุ่มลัดเพื่อแก้ราคา</div>

      <div class="grid">
        <button class="key" data-num="7">7</button>
        <button class="key" data-num="8">8</button>
        <button class="key" data-num="9">9</button>
        <button class="key op" data-action="back">⌫</button>

        <button class="key" data-num="4">4</button>
        <button class="key" data-num="5">5</button>
        <button class="key" data-num="6">6</button>
        <button class="key op" data-action="qty">×</button>

        <button class="key" data-num="1">1</button>
        <button class="key" data-num="2">2</button>
        <button class="key" data-num="3">3</button>
        <button class="key op danger" data-action="clear">C</button>

        <button class="key" data-num=".">.</button>
        <button class="key" data-num="0">0</button>
        <button class="key op add" data-action="add">+ เพิ่ม</button>
        <button class="key op pay" data-action="pay">รับเงิน</button>
      </div>
    </div>

  </div>

  <!-- ============ HISTORY ============ -->
  <div class="history-view" id="historyView">
    <div class="summary-bar">
      <span>วันนี้ <strong id="todayCount">0</strong> บิล</span>
      <span>รวม <strong id="todaySum">฿0</strong></span>
    </div>
    <div class="history-note">// เก็บประวัติย้อนหลัง 30 วัน</div>
    <div id="billList"></div>
    <button class="history-clear" id="clearHistory" style="display:none">ล้างประวัติทั้งหมด</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Modal แก้ราคาปุ่มลัด -->
<div class="modal" id="editModal">
  <div class="modal-card">
    <div class="modal-title">ตั้งราคาปุ่มลัด</div>
    <div class="modal-sub" id="modalSub">ปุ่มที่ 1</div>
    <div class="modal-display" id="modalDisplay">0</div>
    <div class="modal-grid">
      <button class="mkey" data-mn="7">7</button>
      <button class="mkey" data-mn="8">8</button>
      <button class="mkey" data-mn="9">9</button>
      <button class="mkey" data-mn="4">4</button>
      <button class="mkey" data-mn="5">5</button>
      <button class="mkey" data-mn="6">6</button>
      <button class="mkey" data-mn="1">1</button>
      <button class="mkey" data-mn="2">2</button>
      <button class="mkey" data-mn="3">3</button>
      <button class="mkey" data-mn="0">0</button>
      <button class="mkey" data-mn=".">.</button>
      <button class="mkey mback" data-maction="back">⌫</button>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" data-maction="cancel">ยกเลิก</button>
      <button class="modal-btn ok" data-maction="ok">บันทึก</button>
    </div>
  </div>
</div>

<script>
  // ========== STATE ==========
  let currentItems = [];     // [{price, qty}]
  let history = [];
  let display = '0';
  let mode = 'price';        // 'price' | 'qty' | 'pay'
  let pendingPrice = null;
  let paidValue = null;
  let quickValues = [20, 50, 100, 500, 1000];  // ปุ่มลัด แก้ได้
  const STORAGE_KEY = 'pos:bills';
  const QUICK_KEY = 'pos:quick';

  // ========== HELPERS ==========
  const $ = id => document.getElementById(id);
  const fmt = n => '฿' + Number(n).toLocaleString('th-TH', { maximumFractionDigits: 2 });
  const total = () => currentItems.reduce((s, x) => s + x.price * x.qty, 0);
  const itemCount = () => currentItems.reduce((s, x) => s + x.qty, 0);
  const todayKey = () => new Date().toISOString().slice(0,10);

  function toast(msg, duration = 1200) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), duration);
  }

  // ========== STORAGE ==========
  async function loadHistory() {
    try {
      const r = await window.storage.get(STORAGE_KEY);
      history = r ? JSON.parse(r.value) : [];
    } catch (e) { history = []; }
    // ลบบิลที่เก่ากว่า 30 วันออก
    pruneOldHistory();
  }

  function pruneOldHistory() {
    const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000; // 30 วันก่อน
    const before = history.length;
    history = history.filter(b => new Date(b.time).getTime() >= cutoff);
    if (history.length !== before) {
      saveHistory();
    }
  }
  async function saveHistory() {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(history));
    } catch (e) { console.error(e); }
  }
  async function loadQuick() {
    try {
      const r = await window.storage.get(QUICK_KEY);
      if (r) quickValues = JSON.parse(r.value);
    } catch (e) {}
  }
  async function saveQuick() {
    try {
      await window.storage.set(QUICK_KEY, JSON.stringify(quickValues));
    } catch (e) { console.error(e); }
  }

  // ========== RENDER ==========
  function renderReceipt() {
    const list = $('itemList');
    const empty = $('emptyMsg');
    list.innerHTML = '';
    if (currentItems.length === 0) {
      empty.style.display = 'block';
      $('receiptDate').textContent = 'บิลใหม่';
    } else {
      empty.style.display = 'none';
      const now = new Date();
      $('receiptDate').textContent = `กำลังคิด · ${now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}`;
      currentItems.forEach((it, i) => {
        const row = document.createElement('div');
        row.className = 'item';
        row.innerHTML = `
          <span class="item-label">
            <span class="item-num">${String(i+1).padStart(2,'0')}</span>${fmt(it.price)}
          </span>
          <span class="qty-ctrl">
            <button class="qty-btn" data-dec="${i}">−</button>
            <span class="qty-val">${it.qty}</span>
            <button class="qty-btn" data-inc="${i}">+</button>
          </span>
          <span class="item-price">${fmt(it.price * it.qty)}</span>
          <button class="item-del" data-del="${i}">×</button>
        `;
        list.appendChild(row);
      });
    }
    $('itemCount').textContent = itemCount();
    $('grandTotal').textContent = fmt(total());
    $('exactBtn').disabled = currentItems.length === 0;

    // payment area
    if (mode === 'pay' && paidValue !== null) {
      const change = paidValue - total();
      $('paidRow').style.display = 'flex';
      $('changeRow').style.display = 'flex';
      $('paidAmount').textContent = fmt(paidValue);
      $('changeAmount').textContent = (change < 0 ? '-' : '') + fmt(Math.abs(change));
      $('changeAmount').className = 'change' + (change < 0 ? ' negative' : '');
    } else {
      $('paidRow').style.display = 'none';
      $('changeRow').style.display = 'none';
    }

    let modeText = 'ราคา';
    if (mode === 'qty') modeText = `จำนวน × ${fmt(pendingPrice)}`;
    else if (mode === 'pay') modeText = 'รับเงิน';
    $('modeLabel').textContent = modeText;
    document.querySelector('.app').classList.toggle('pay-mode', mode === 'pay');
    document.querySelector('.app').classList.toggle('qty-mode', mode === 'qty');
    $('displayValue').textContent = display === '' ? '0' : display;

    // auto-scroll ลงล่างเพื่อให้รายการล่าสุดเห็นได้เสมอ
    const r = $('receipt');
    r.scrollTop = r.scrollHeight;
  }

  function renderHistory() {
    const list = $('billList');
    list.innerHTML = '';
    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty"><div style="font-size:14px;color:var(--green-soft);margin-bottom:8px">$ ดูประวัติ</div>ยังไม่มีบิล</div>';
      $('clearHistory').style.display = 'none';
    } else {
      $('clearHistory').style.display = 'block';
      // newest first
      [...history].reverse().forEach(b => {
        const d = new Date(b.time);
        const card = document.createElement('div');
        card.className = 'bill-card';
        const summary = b.items.map(it => {
          if (typeof it === 'number') return Number(it).toLocaleString('th-TH');
          return it.qty > 1
            ? `${it.qty}×${Number(it.price).toLocaleString('th-TH')}`
            : Number(it.price).toLocaleString('th-TH');
        }).join(' + ');
        const itemsCount = b.items.reduce((s, it) =>
          s + (typeof it === 'number' ? 1 : it.qty), 0);
        card.innerHTML = `
          <div class="bill-head">
            <span>${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</span>
            <span class="bill-total">${fmt(b.total)}</span>
          </div>
          <div class="bill-meta">
            ${itemsCount} ชิ้น · ${summary}
            ${b.paid ? `<br>รับ ${fmt(b.paid)} · ทอน ${fmt(b.paid - b.total)}` : ''}
          </div>
        `;
        list.appendChild(card);
      });
    }
    // today summary
    const today = todayKey();
    const todays = history.filter(b => b.time.slice(0,10) === today);
    $('todayCount').textContent = todays.length;
    $('todaySum').textContent = fmt(todays.reduce((s,b)=>s+b.total, 0));
  }

  // ========== KEYPAD LOGIC ==========
  function inputDigit(d) {
    if (d === '.' && display.includes('.')) return;
    if (display === '0' && d !== '.') display = d;
    else display += d;
    renderReceipt();
    // flash จอเพื่อ feedback
    const dv = $('displayValue');
    dv.classList.remove('flash');
    void dv.offsetWidth;
    dv.classList.add('flash');
    setTimeout(() => dv.classList.remove('flash'), 100);
  }
  function backspace() {
    display = display.length <= 1 ? '0' : display.slice(0, -1);
    renderReceipt();
  }
  function clearDisplay() {
    display = '0';
    if (mode !== 'price') {
      mode = 'price';
      pendingPrice = null;
      paidValue = null;
    }
    renderReceipt();
  }
  function quickAmount(n) {
    const price = Number(n);
    // ถ้ารายการล่าสุดราคาเดียวกัน → เพิ่มจำนวน, ไม่งั้น push ใหม่
    const last = currentItems[currentItems.length - 1];
    if (last && last.price === price) {
      last.qty++;
    } else {
      currentItems.push({ price, qty: 1 });
    }
    // reset display + ออกจาก pay mode ถ้าอยู่
    display = '0';
    if (mode === 'pay') { mode = 'price'; paidValue = null; }
    renderReceipt();
  }
  function enterQtyMode() {
    if (mode === 'pay') return;
    if (mode === 'qty') {
      // toggle back
      mode = 'price';
      display = String(pendingPrice);
      pendingPrice = null;
      renderReceipt();
      return;
    }
    const v = parseFloat(display);
    if (!v || v <= 0) { toast('! ใส่ราคาก่อน'); return; }
    pendingPrice = v;
    mode = 'qty';
    display = '0';
    renderReceipt();
    toast('> ใส่จำนวน');
  }
  function addItem() {
    if (mode === 'qty') {
      const q = parseInt(display, 10);
      if (!q || q <= 0) { toast('! ใส่จำนวน'); return; }
      currentItems.push({ price: pendingPrice, qty: q });
      mode = 'price';
      pendingPrice = null;
      display = '0';
      renderReceipt();
      return;
    }
    const v = parseFloat(display);
    if (!v || v <= 0) { toast('! ใส่ราคาก่อน'); return; }
    currentItems.push({ price: v, qty: 1 });
    display = '0';
    mode = 'price';
    paidValue = null;
    renderReceipt();
  }
  function finalizeBill(paid) {
    const t = total();
    const bill = {
      time: new Date().toISOString(),
      items: [...currentItems],
      total: t,
      paid: paid
    };
    history.push(bill);
    pruneOldHistory();
    saveHistory();
    const change = paid - t;
    if (change > 0) {
      paidValue = paid;
      mode = 'pay';
      renderReceipt();
      // โชว์เงินทอน 5 วินาที พร้อม countdown bar
      toast(`เงินทอน ${fmt(change)}`, 5000);
      const bar = $('countdownBar');
      const fill = $('countdownFill');
      bar.style.display = 'block';
      // restart animation
      fill.style.animation = 'none';
      void fill.offsetWidth;
      fill.style.animation = 'countdownShrink 5s linear forwards';
      setTimeout(() => {
        bar.style.display = 'none';
        resetBill();
        renderHistory();
      }, 5000);
    } else {
      toast('✓ จ่ายพอดี');
      resetBill();
      renderHistory();
    }
  }

  function resetBill() {
    currentItems = [];
    display = '0';
    mode = 'price';
    pendingPrice = null;
    paidValue = null;
    renderReceipt();
  }

  function payExact() {
    if (currentItems.length === 0) { toast('! ยังไม่มีรายการ'); return; }
    finalizeBill(total());
  }

  function startPay() {
    if (currentItems.length === 0) { toast('! ยังไม่มีรายการ'); return; }
    if (mode !== 'pay') {
      mode = 'pay';
      display = '0';
      paidValue = null;
      renderReceipt();
      toast('> ใส่จำนวนเงินที่รับ');
      return;
    }
    const v = parseFloat(display);
    if (!v || v <= 0) { toast('! ใส่จำนวนเงินที่รับ'); return; }
    if (v < total()) { toast('! เงินไม่พอ'); return; }
    finalizeBill(v);
  }

  // ========== EVENTS ==========
  document.querySelectorAll('[data-num]').forEach(b =>
    b.addEventListener('click', () => inputDigit(b.dataset.num)));

  function renderQuick() {
    const row = $('quickRow');
    row.innerHTML = '';
    quickValues.forEach((v, i) => {
      const btn = document.createElement('button');
      btn.className = 'quick';
      btn.textContent = v;
      btn.dataset.idx = i;
      let timer = null, longPress = false;
      const start = (e) => {
        longPress = false;
        timer = setTimeout(() => {
          longPress = true;
          editQuick(i);
        }, 500);
      };
      const cancel = () => clearTimeout(timer);
      btn.addEventListener('touchstart', start, { passive: true });
      btn.addEventListener('touchend', cancel);
      btn.addEventListener('touchmove', cancel);
      btn.addEventListener('mousedown', start);
      btn.addEventListener('mouseup', cancel);
      btn.addEventListener('mouseleave', cancel);
      btn.addEventListener('click', () => {
        if (longPress) return;
        quickAmount(quickValues[i]);
      });
      // right-click on desktop ก็แก้ได้
      btn.addEventListener('contextmenu', e => { e.preventDefault(); editQuick(i); });
      row.appendChild(btn);
    });
  }

  let editingIdx = -1;
  let modalDisplay = '0';

  function editQuick(i) {
    editingIdx = i;
    modalDisplay = String(quickValues[i]);
    $('modalSub').textContent = `ปุ่มที่ ${i+1}`;
    $('modalDisplay').textContent = modalDisplay;
    $('editModal').classList.add('show');
  }

  function closeModal() {
    $('editModal').classList.remove('show');
    editingIdx = -1;
  }

  function modalInput(d) {
    if (d === '.' && modalDisplay.includes('.')) return;
    if (modalDisplay === '0' && d !== '.') modalDisplay = d;
    else modalDisplay += d;
    $('modalDisplay').textContent = modalDisplay;
  }
  function modalBack() {
    modalDisplay = modalDisplay.length <= 1 ? '0' : modalDisplay.slice(0, -1);
    $('modalDisplay').textContent = modalDisplay;
  }
  function modalConfirm() {
    const n = parseFloat(modalDisplay);
    if (!n || n <= 0) { toast('! ราคาต้องมากกว่า 0'); return; }
    quickValues[editingIdx] = n;
    saveQuick();
    renderQuick();
    closeModal();
    toast('✓ บันทึกแล้ว');
  }

  // modal events
  document.querySelectorAll('#editModal [data-mn]').forEach(b =>
    b.addEventListener('click', () => modalInput(b.dataset.mn)));
  document.querySelector('[data-maction="back"]').addEventListener('click', modalBack);
  document.querySelector('[data-maction="cancel"]').addEventListener('click', closeModal);
  document.querySelector('[data-maction="ok"]').addEventListener('click', modalConfirm);
  // tap backdrop to close
  $('editModal').addEventListener('click', e => {
    if (e.target === $('editModal')) closeModal();
  });
  document.querySelector('[data-action="back"]').addEventListener('click', backspace);
  document.querySelector('[data-action="clear"]').addEventListener('click', clearDisplay);
  document.querySelector('[data-action="qty"]').addEventListener('click', enterQtyMode);
  document.querySelector('[data-action="add"]').addEventListener('click', addItem);
  document.querySelector('[data-action="pay"]').addEventListener('click', startPay);
  $('exactBtn').addEventListener('click', payExact);

  // delete + adjust qty
  $('itemList').addEventListener('click', e => {
    const t = e.target;
    if (t.dataset?.del !== undefined) {
      currentItems.splice(Number(t.dataset.del), 1);
      renderReceipt();
    } else if (t.dataset?.inc !== undefined) {
      currentItems[Number(t.dataset.inc)].qty++;
      renderReceipt();
    } else if (t.dataset?.dec !== undefined) {
      const i = Number(t.dataset.dec);
      if (currentItems[i].qty > 1) {
        currentItems[i].qty--;
      } else {
        currentItems.splice(i, 1);
      }
      renderReceipt();
    }
  });

  // tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const isHist = t.dataset.tab === 'history';
      $('registerView').style.display = isHist ? 'none' : 'flex';
      $('historyView').classList.toggle('active', isHist);
      if (isHist) renderHistory();
    });
  });

  // clear history
  $('clearHistory').addEventListener('click', async () => {
    if (!confirm('ล้างประวัติทั้งหมด?')) return;
    history = [];
    await saveHistory();
    renderHistory();
  });

  // ========== INIT ==========
  (async () => {
    await loadHistory();
    await loadQuick();
    renderQuick();
    renderReceipt();
    renderHistory();
  })();
</script>
</body>
</html>
